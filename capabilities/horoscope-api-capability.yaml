naftiko: 1.0.0-alpha2
info:
  label: Horoscope API
  description: The Horoscope API provides daily, weekly, and monthly horoscope predictions for each zodiac sign, delivering
    personalized astrological insights in JSON format.
  tags:
  - Horoscope
  - Api
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: horoscope-api
    baseUri: https://freehoroscopeapi.com
    description: Horoscope API HTTP API.
    resources:
    - name: api-v1-get-horoscope-daily
      path: /api/v1/get-horoscope/daily
      operations:
      - name: getdailyhoroscope
        method: GET
        description: Get Daily Horoscope
        inputParameters:
        - name: sign
          in: query
          type: string
          required: true
          description: Zodiac sign (case-insensitive).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-get-horoscope-weekly
      path: /api/v1/get-horoscope/weekly
      operations:
      - name: getweeklyhoroscope
        method: GET
        description: Get Weekly Horoscope
        inputParameters:
        - name: sign
          in: query
          type: string
          required: true
          description: Zodiac sign (case-insensitive).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-v1-get-horoscope-monthly
      path: /api/v1/get-horoscope/monthly
      operations:
      - name: getmonthlyhoroscope
        method: GET
        description: Get Monthly Horoscope
        inputParameters:
        - name: sign
          in: query
          type: string
          required: true
          description: Zodiac sign (case-insensitive).
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: horoscope-api-rest
    description: REST adapter for Horoscope API.
    resources:
    - path: /api/v1/get-horoscope/daily
      name: getdailyhoroscope
      operations:
      - method: GET
        name: getdailyhoroscope
        description: Get Daily Horoscope
        call: horoscope-api.getdailyhoroscope
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/v1/get-horoscope/weekly
      name: getweeklyhoroscope
      operations:
      - method: GET
        name: getweeklyhoroscope
        description: Get Weekly Horoscope
        call: horoscope-api.getweeklyhoroscope
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/v1/get-horoscope/monthly
      name: getmonthlyhoroscope
      operations:
      - method: GET
        name: getmonthlyhoroscope
        description: Get Monthly Horoscope
        call: horoscope-api.getmonthlyhoroscope
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: horoscope-api-mcp
    transport: http
    description: MCP adapter for Horoscope API for AI agent use.
    tools:
    - name: getdailyhoroscope
      description: Get Daily Horoscope
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horoscope-api.getdailyhoroscope
      with:
        sign: tools.sign
      inputParameters:
      - name: sign
        type: string
        description: Zodiac sign (case-insensitive).
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: getweeklyhoroscope
      description: Get Weekly Horoscope
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horoscope-api.getweeklyhoroscope
      with:
        sign: tools.sign
      inputParameters:
      - name: sign
        type: string
        description: Zodiac sign (case-insensitive).
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: getmonthlyhoroscope
      description: Get Monthly Horoscope
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: horoscope-api.getmonthlyhoroscope
      with:
        sign: tools.sign
      inputParameters:
      - name: sign
        type: string
        description: Zodiac sign (case-insensitive).
        required: true
      outputParameters:
      - type: object
        mapping: $.
